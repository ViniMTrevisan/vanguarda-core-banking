services:
  postgres:
    image: postgres:16-alpine
    container_name: vcb-postgres
    environment:
      POSTGRES_DB: vcb_db
      POSTGRES_USER: vcb
      POSTGRES_PASSWORD: vcb_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcb -d vcb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vcb-redis
    command: redis-server --requirepass vcb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vcb_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vcb-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: vcb
      RABBITMQ_DEFAULT_PASS: vcb_secret
      RABBITMQ_DEFAULT_VHOST: /vcb
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: vcb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: vcb-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  app:
    build: .
    container_name: vcb-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vcb_db
      DB_USER: vcb
      DB_PASS: vcb_secret
      REDIS_HOST: redis
      REDIS_PASS: vcb_redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: vcb
      RABBITMQ_PASS: vcb_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  grafana_data:
