server:
  port: 8080

spring:
  application:
    name: vanguarda-core-banking

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vcb_db}
    username: ${DB_USER:vcb}
    password: ${DB_PASS:vcb_secret}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASS:vcb_redis}
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:vcb}
    password: ${RABBITMQ_PASS:vcb_secret}
    virtual-host: /vcb

vcb:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-hours: 24
    auth-client-id: ${AUTH_CLIENT_ID}
    auth-client-secret: ${AUTH_CLIENT_SECRET}
  idempotency:
    ttl-hours: 24
    processing-ttl-seconds: 30
  distributed-lock:
    ttl-seconds: 10
    retry-attempts: 3
    retry-interval-ms: 100
  transfer:
    retry-attempts: 5
    retry-backoff-ms: 50
  rabbitmq:
    exchange: vcb.transactions
    dlx: vcb.transactions.dlx

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
